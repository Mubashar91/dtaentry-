    <!-- JSON-LD: Organization + Service (base; per-page schemas injected by React) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",

            "@type": "ContactPoint",

        },
        {
          "@type": "WebSite",
          "@id": "https://dataentrypro.com/#website",
          "url": "https://dataentrypro.com",
          "name": "DataEntry Pro",
          "publisher": { "@id": "https://dataentrypro.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://dataentrypro.com/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Service",
          "name": "Professional Data Entry Services",
